<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">从一次对话到可复用 Codex Skill 的发布闭环</title>
  <desc id="desc">流程图展示从提出需求、观察项目、生成 Skill、实战反馈，到预览确认、保存源码、部署页面和检查状态的闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3e8"/>
      <stop offset="0.52" stop-color="#ecf5f2"/>
      <stop offset="1" stop-color="#f4ebf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#24312f" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#37635c"/>
    </marker>
    <style>
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2b29; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52615e; }
      .step-title { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #20302d; }
      .step-body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #53625f; }
      .badge { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .line { stroke: #37635c; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); fill: none; }
      .card { fill: #ffffff; stroke: rgba(31, 43, 41, 0.12); stroke-width: 1.5; filter: url(#shadow); }
      .chip { fill: #37635c; }
      .accent { fill: #dfb85c; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1030" cy="112" r="78" fill="#dfb85c" opacity="0.22"/>
  <circle cx="150" cy="648" r="96" fill="#5c8d86" opacity="0.14"/>

  <text x="72" y="84" class="title">从一次对话生成 Codex Skill</text>
  <text x="74" y="120" class="subtitle">把模糊需求迭代成可写作、可预览、可保存源码、可部署页面的发布 Runbook</text>

  <g transform="translate(72 176)">
    <rect class="card" x="0" y="0" width="250" height="126" rx="14"/>
    <circle class="chip" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">1</text>
    <text class="step-title" x="64" y="42">提出目标</text>
    <text class="step-body" x="26" y="78">写博客并一键部署</text>
    <text class="step-body" x="26" y="102">先定义想要的结果</text>
  </g>

  <g transform="translate(362 176)">
    <rect class="card" x="0" y="0" width="250" height="126" rx="14"/>
    <circle class="chip" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">2</text>
    <text class="step-title" x="64" y="42">观察项目</text>
    <text class="step-body" x="26" y="78">确认 Hexo、目录、脚本</text>
    <text class="step-body" x="26" y="102">从真实配置提炼规则</text>
  </g>

  <g transform="translate(652 176)">
    <rect class="card" x="0" y="0" width="250" height="126" rx="14"/>
    <circle class="chip" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">3</text>
    <text class="step-title" x="64" y="42">生成 Skill</text>
    <text class="step-body" x="26" y="78">写作、构建、部署规则</text>
    <text class="step-body" x="26" y="102">先有可执行骨架</text>
  </g>

  <g transform="translate(942 176)">
    <rect class="card" x="0" y="0" width="186" height="126" rx="14"/>
    <circle class="accent" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">4</text>
    <text class="step-title" x="64" y="42">实战反馈</text>
    <text class="step-body" x="24" y="78">图片路径</text>
    <text class="step-body" x="24" y="102">预览顺序</text>
  </g>

  <path class="line" d="M334 239 H348"/>
  <path class="line" d="M624 239 H638"/>
  <path class="line" d="M914 239 H928"/>

  <g transform="translate(72 394)">
    <rect class="card" x="0" y="0" width="250" height="126" rx="14"/>
    <circle class="chip" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">5</text>
    <text class="step-title" x="64" y="42">构建检查</text>
    <text class="step-body" x="26" y="78">npm run build</text>
    <text class="step-body" x="26" y="102">检查 HTML 与图片资源</text>
  </g>

  <g transform="translate(362 394)">
    <rect class="card" x="0" y="0" width="250" height="126" rx="14"/>
    <circle class="chip" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">6</text>
    <text class="step-title" x="64" y="42">本地预览</text>
    <text class="step-body" x="26" y="78">localhost:8080</text>
    <text class="step-body" x="26" y="102">用户确认后再继续</text>
  </g>

  <g transform="translate(652 394)">
    <rect class="card" x="0" y="0" width="250" height="126" rx="14"/>
    <circle class="chip" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">7</text>
    <text class="step-title" x="64" y="42">保存源码</text>
    <text class="step-body" x="26" y="78">提交并推送 Gitee</text>
    <text class="step-body" x="26" y="102">Markdown 与图片都入库</text>
  </g>

  <g transform="translate(942 394)">
    <rect class="card" x="0" y="0" width="186" height="126" rx="14"/>
    <circle class="chip" cx="35" cy="34" r="17"/>
    <text class="badge" x="30" y="40">8</text>
    <text class="step-title" x="64" y="42">部署页面</text>
    <text class="step-body" x="24" y="78">Hexo deploy</text>
    <text class="step-body" x="24" y="102">发布 GitHub Pages</text>
  </g>

  <path class="line" d="M1035 318 C1035 354 198 352 198 380"/>
  <path class="line" d="M334 457 H348"/>
  <path class="line" d="M624 457 H638"/>
  <path class="line" d="M914 457 H928"/>

  <rect x="244" y="618" width="712" height="54" rx="27" fill="#20302d" opacity="0.92"/>
  <text x="290" y="652" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="#ffffff">完成定义：预览确认 + 源码保存 + 页面部署 + Git 状态干净</text>
</svg>
